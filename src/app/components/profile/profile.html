<div style="min-height:100vh;background:#f8fafc;padding:2rem;">
  <div style="max-width:480px;margin:0 auto;">

    <div style="display:flex;align-items:center;gap:12px;margin-bottom:2rem;">
      <button (click)="goBack()"
        style="background:#fff;border:1px solid #e2e8f0;color:#64748b;padding:8px 14px;border-radius:10px;cursor:pointer;font-size:14px;">
        ← Back
      </button>
      <h1 style="font-size:20px;font-weight:700;color:#0f172a;">Profile Settings</h1>
    </div>

    @if (error) {
      <div style="background:#fef2f2;border:1px solid #fecaca;color:#dc2626;padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:1rem;">{{ error }}</div>
    }
    @if (success) {
      <div style="background:#f0fdf4;border:1px solid #bbf7d0;color:#15803d;padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:1rem;">{{ success }}</div>
    }

    <!-- Avatar -->
    <div style="background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:1.5rem;margin-bottom:1rem;display:flex;align-items:center;gap:16px;">
      <div style="width:56px;height:56px;border-radius:50%;background:#6366f1;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff;">
        {{ username.charAt(0).toUpperCase() }}
      </div>
      <div>
        <div style="font-size:16px;font-weight:700;color:#0f172a;">{{ username }}</div>
        <div style="font-size:13px;color:#94a3b8;">Your profile</div>
      </div>
    </div>

    <!-- Change Username -->
    <div style="background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:1.5rem;margin-bottom:1rem;">
      <h3 style="font-size:15px;font-weight:700;color:#0f172a;margin-bottom:1rem;">Change Username</h3>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <input [(ngModel)]="newUsername" placeholder="New username"
          style="width:100%;padding:0.75rem 1rem;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;color:#0f172a;outline:none;box-sizing:border-box;"
          onfocus="this.style.borderColor='#6366f1'" onblur="this.style.borderColor='#e2e8f0'" />
        <input [(ngModel)]="oldPassword" type="password" placeholder="Current password to confirm"
          style="width:100%;padding:0.75rem 1rem;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;color:#0f172a;outline:none;box-sizing:border-box;"
          onfocus="this.style.borderColor='#6366f1'" onblur="this.style.borderColor='#e2e8f0'" />
        <button (click)="changeUsername()" [disabled]="loading"
          style="width:100%;padding:0.75rem;background:#6366f1;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;">
          {{ loading ? 'Saving...' : 'Update Username' }}
        </button>
      </div>
    </div>

    <!-- Change Password -->
    <div style="background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:1.5rem;">
      <h3 style="font-size:15px;font-weight:700;color:#0f172a;margin-bottom:1rem;">Change Password</h3>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <input [(ngModel)]="oldPassword" type="password" placeholder="Current password"
          style="width:100%;padding:0.75rem 1rem;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;color:#0f172a;outline:none;box-sizing:border-box;"
          onfocus="this.style.borderColor='#6366f1'" onblur="this.style.borderColor='#e2e8f0'" />
        <input [(ngModel)]="newPassword" type="password" placeholder="New password"
          style="width:100%;padding:0.75rem 1rem;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;color:#0f172a;outline:none;box-sizing:border-box;"
          onfocus="this.style.borderColor='#6366f1'" onblur="this.style.borderColor='#e2e8f0'" />
        <input [(ngModel)]="confirmPassword" type="password" placeholder="Confirm new password"
          style="width:100%;padding:0.75rem 1rem;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;color:#0f172a;outline:none;box-sizing:border-box;"
          onfocus="this.style.borderColor='#6366f1'" onblur="this.style.borderColor='#e2e8f0'" />
        <button (click)="changePassword()" [disabled]="loading"
          style="width:100%;padding:0.75rem;background:#6366f1;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;">
          {{ loading ? 'Saving...' : 'Change Password' }}
        </button>
      </div>
    </div>

  </div>
</div>
