<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);">
  <div style="width:100%;max-width:400px;padding:1rem;">

    <div style="text-align:center;margin-bottom:2rem;">
      <div style="width:52px;height:52px;border-radius:14px;background:#6366f1;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:24px;">💬</div>
      <h1 style="font-size:24px;font-weight:700;color:#fff;margin-bottom:6px;">Welcome back</h1>
      <p style="font-size:14px;color:#94a3b8;">Sign in to continue chatting</p>
    </div>

    <div style="background:#1e293b;border:0.5px solid rgba(255,255,255,0.08);border-radius:16px;padding:1.75rem;">

      @if (error) {
        <div style="background:rgba(239,68,68,0.1);border:0.5px solid rgba(239,68,68,0.3);color:#fca5a5;padding:0.75rem 1rem;border-radius:10px;margin-bottom:1.25rem;font-size:13px;">
          {{ error }}
        </div>
      }

      <div style="display:flex;flex-direction:column;gap:1rem;">
        <div>
          <label style="display:block;font-size:12px;font-weight:600;color:#94a3b8;margin-bottom:6px;letter-spacing:.05em;text-transform:uppercase;">Username</label>
          <input [(ngModel)]="username" placeholder="Enter your username"
            style="width:100%;padding:0.75rem 1rem;background:#0f172a;border:0.5px solid rgba(255,255,255,0.1);border-radius:10px;font-size:14px;color:#fff;outline:none;transition:border-color .15s;"
            onfocus="this.style.borderColor='#6366f1'" onblur="this.style.borderColor='rgba(255,255,255,0.1)'" />
        </div>
        <div>
          <label style="display:block;font-size:12px;font-weight:600;color:#94a3b8;margin-bottom:6px;letter-spacing:.05em;text-transform:uppercase;">Password</label>
          <input [(ngModel)]="password" type="password" placeholder="Enter your password"
            (keydown.enter)="onLogin()"
            style="width:100%;padding:0.75rem 1rem;background:#0f172a;border:0.5px solid rgba(255,255,255,0.1);border-radius:10px;font-size:14px;color:#fff;outline:none;transition:border-color .15s;"
            onfocus="this.style.borderColor='#6366f1'" onblur="this.style.borderColor='rgba(255,255,255,0.1)'" />
        </div>
        <button (click)="onLogin()" [disabled]="loading"
          style="width:100%;padding:0.875rem;background:#6366f1;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px;transition:background .15s;"
          onmouseover="this.style.background='#4f46e5'" onmouseout="this.style.background='#6366f1'">
          {{ loading ? 'Signing in...' : 'Sign in' }}
        </button>
      </div>

      <p style="margin-top:1.25rem;text-align:center;font-size:13px;color:#64748b;">
        No account?
        <a routerLink="/register" style="color:#818cf8;text-decoration:none;font-weight:500;">Create one</a>
      </p>
    </div>
  </div>
</div>
